<!DOCTYPE html>

<html>

<head>

    <title>Team Availability Tracker</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>👥 Team Availability Tracker</h1>

<div class="container">

{% for member in members %}

<div class="card">

<h2>{{ member[1] }}</h2>

<h4>{{ member[2] }}</h4>

{% if member[3] == 1 %}

<p class="available">🟢 Available</p>

{% else %}

<p class="busy">🔴 Busy</p>

{% endif %}

<a href="/toggle/{{ member[0] }}">

<button>Toggle Status</button>

</a>

</div>

{% endfor %}

</div>

</body>

</html>
